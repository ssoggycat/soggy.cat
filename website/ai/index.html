<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>soggy.AI</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="We turned him into essence">
	<style>
		@font-face {
			font-family: 'SF Pro Display';
			src: url('assets/fonts/sanfrancisco.woff2') format('woff2');
			font-weight: normal; font-style: normal;
			font-display: swap;
		}
		html, body {
			height: 100%; min-height: 100vh;
			margin: 0; padding: 0;
			font-family: 'SF Pro Display', 'San Francisco', Arial, sans-serif;
			background: #f8f9fa; color: #262626;
			transition: background 0.3s; overflow-x: hidden;
		}
		::-webkit-scrollbar {
			width: 8px;
			background: transparent;
		}
		::-webkit-scrollbar-thumb {
			background: transparent;
			border-radius: 6px; min-height: 30px;
		}
		::-webkit-scrollbar-thumb:hover {background: transparent}
		::-webkit-scrollbar-corner {background: transparent}
		::-webkit-scrollbar-button {
			display: none;
			background: transparent;
			height: 0;
			width: 0;
		}
		html {
			scrollbar-width: thin;
			scrollbar-color: #d6d6d6 transparent;
		}

		.particlesbg {
			position: fixed; inset: 0;
			width: 100%; height: 100%;
			z-index: 0; pointer-events: none;
		}

		/*//////////////////////////////////////////////////////////////////////*/

		#hypnotizebg {
			position: fixed;
			left: 0; top: 0; width: 100vw; height: 100vh;
			z-index: 0;
			pointer-events: none;
			background: url('assets/images/hypnotize.gif') center center / cover repeat;
			opacity: 0;
		}
		#investnowmid {
			position: fixed;
			left: 0; top: 0; width: 100vw; height: 100vh;
			z-index: 9999;
			display: flex;
			align-items: center;
			justify-content: center;
			pointer-events: none;
			opacity: 0;
		}
		.investnowmidtxt {
			color: #301c2f;
			font-family: 'SF Pro Display', sans-serif;
			font-size: 13vw; font-weight: 1000;
			letter-spacing: 0.35em; text-transform: uppercase;
			text-align: center;
			line-height: 0.93;
			user-select: none;
			filter:
				drop-shadow(0 12px 24px #d2f3ff)
				drop-shadow(0 0 50px #ff00ffe9)
				blur(0.3px) saturate(2.2);
			transform: skewY(-8deg) skewX(-6deg) rotate(-3deg) scale(1.09);
			background: linear-gradient(94deg, #ffe8fa 8%, #a5fff7 24%, #ffd6fa 38%, #fff 54%, #b9e0fd 71%, #ecb7ff 93%);
			background-clip: text;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			will-change: filter, color, transform;
		}

		/*//////////////////////////////////////////////////////////////////////*/

		main {
			position: relative; z-index: 1;
			width: 100vw;
			display: flex; flex-direction: column;
			align-items: center; padding: 0;
		}
		#herosplash {
			min-height: 100vh; width: 100%;
			display: flex; flex-direction: column;
			justify-content: center; align-items: center;
			box-sizing: border-box;
			padding-bottom: 5rem;
			position: relative;
			z-index: -1;
		}
		#herosog3d {
			position: absolute; inset: 0;
			display: flex; align-items: center;
			justify-content: center; pointer-events: none;
			z-index: 0; perspective: 500px;
			perspective-origin: 50% 45%; overflow: hidden;
		}
		.herosogstage {
			width: min(78vmin, 540px);
			animation: sogspacedrift 56s linear infinite;
		}
		.herosogimg {
			width: 100%; height: auto;
			display: block;
			filter: invert(0.9);
		}
		.herosoginner {
			animation: sogspacespin 38s linear infinite;
		}
		@keyframes sogspacespin {
			from {
				transform: rotateX(22deg) rotateY(-8deg);
				transform: rotateZ(0deg);
			}
			to {
				transform: rotateX(22deg) rotateY(-8deg);
				transform: rotateZ(360deg);
			}
		}
		@keyframes sogspacedrift {
			0% {
				transform: translate3d(0, 0, -120px) rotateX(-6deg);
				transform: rotateY(0deg);
			}
			50% {
				transform: translate3d(0, 8px, -80px) rotateX(4deg);
				transform: rotateY(180deg);
			}
			100% {
				transform: translate3d(0, 0, -120px) rotateX(-6deg);
				transform: rotateY(360deg);
			}
		}

		/*//////////////////////////////////////////////////////////////////////*/

		.herosplashtext {
			position: relative; z-index: 1;
			display: flex; flex-direction: column;
			align-items: center;
		}
		.splashtitle {
			margin: 0; font-size: 2.6rem;
			font-weight: 600; color: #222;
			background: none; letter-spacing: 1.2px;
			text-align: center; line-height: 1.15;
			user-select: none;
		}
		.slogan {
			margin-top: 1.1rem; width: 100%;
			max-width: 28rem; display: flex;
			flex-direction: column; align-items: center;
			font-size: 1.1rem; color: #555;
			opacity: 0.92; text-align: center;
			pointer-events: none; user-select: none;
		}
		.scrolldown {
			position: absolute; bottom: 2.3vh;
			left: 50%; transform: translateX(-50%);
			font-size: 1.08rem; color: #888;
			opacity: 0.5; transition: opacity 0.35s;
			pointer-events: auto; user-select: none;
			cursor: pointer;
		}

		.section-animated {
			width: 110%;
			transform: translateY(40px) scale(0.93);
			transition: transform 0.7s;
		}

		.section-animated-open {
			transform: none;
			pointer-events: auto; max-height: 4000px;
		}

		.scrolldown.bounce {
			animation: bouncescroll 0.81s infinite cubic-bezier(0.22, 1.09, 0.61, 0.83);
		}
		@keyframes bouncescroll {
			0% {transform: translateX(-50%) translateY(0)}
			36% {transform: translateX(-50%) translateY(-7px)}
			63% {transform: translateX(-50%) translateY(2px)}
			100% {transform: translateX(-50%) translateY(0)}
		}
		@media (max-width: 650px) {
			.splashtitle {font-size: 2rem}
			.slogan {font-size: 1rem}
			.investnowmidtxt {font-size: 11vw}
		}

		/*//////////////////////////////////////////////////////////////////////*/

		footer {
			text-align: center; padding: 1.3rem;
			background: #f3f4f6;
			font-size: 1.03rem; color: #9b9b9b;
			width: 100%;
		}

		.section-demo {
			z-index: 1;
			border: 1px solid #e3e3e3;
			padding: 0;
			border-left: none;
			border-right: none;
		}

		section {
			padding: 2rem 0;
			background-color: #f8f9fa;
			width: 100%;
			text-align: center;
		}

		.section-c-reading {
			text-align: left;
			margin-left: auto;
			margin-right: auto;
			max-width: 50rem;
		}
		.section-features {
			display: flex; flex-wrap: wrap;
			gap: 2rem; justify-content: space-between;
			margin-bottom: 2rem;
		}
		.feature {
			flex: 1 1 220px; background: #f6f6f6;
			border-radius: 14px; padding: 1.7rem 1.1rem;
			box-shadow: 0 3px 15px -7px rgba(0,0,0,0.14);
			margin: 0.5rem; min-width: 180px;
			text-align: center;
		}
		.feature h3 {
			color: #323232; margin-bottom: 0.6rem;
			font-size: 1.05rem;
		}
		.feature p {
			color: #7b7b7b; font-size: 0.94rem;
		}
		#demoquestion {
			flex: 1; padding: 0.9em 1em;
			font-size: 1.09rem; border-radius: 32px 0 0 32px;
			border: 1px solid #d7d7d7; outline: none;
			background: #fafbfb; color: #222;
		}
		#demoquestion::placeholder {color: #bcbcbc}

		#demoahh {
			color: red;
			animation: shakefuriously 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1 both;
			display: inline-block;
		}
		@keyframes shakefuriously {
			0% {transform: translate(0, -30px); color: white}
			100% {transform: translate(0, 0)}
		}

		#btnask {
			border: none; cursor: pointer;
			background: #e2e5e7; color: #222;
			transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.35s ease;
			border-radius: 0 32px 32px 0;
			box-shadow: 0 4px 18px -10px rgba(180,180,180,0.18);
			padding: 0 1.6em; font-size: 1rem;
			font-family: inherit;
		}
		#btnask.animating {animation: askpop 0.5s cubic-bezier(0.34, 1.45, 0.64, 1)}

		@keyframes askpop {
			0% {
				transform: scale(1);
				box-shadow: 0 4px 18px -10px rgba(200,200,200,0.15);
			}
			35% {
				transform: scale(0.9);
				box-shadow: 0 2px 12px -5px rgba(200,200,200,0.09);
			}
			70% {
				transform: scale(1.03);
				box-shadow: 0 8px 28px -4px rgba(200,200,200,0.13);
			}
			100% {
				transform: scale(1);
				box-shadow: 0 4px 18px -10px rgba(200,200,200,0.15);
			}
		}

	</style>
	<meta name="color-scheme" content="light">
</head>
<body>


	<div id="hypnotizebg"></div>
	<div id="investnowmid">
		<span class="investnowmidtxt">INVEST NOW</span>
	</div>

	<canvas class="particlesbg" aria-hidden="true"></canvas>
	<main>
		<div id="herosplash">
			<div id="herosog3d" aria-hidden="true">
				<div class="herosogstage">
					<div class="herosoginner">
						<img class="herosogimg" src="/static/ssoggycat/main/svgs/modern.svg" width="1453" height="1794">

		<section class="section" style="background-color: black; color:white;">

		<footer>

	<script>
		(function freeinvestorgenerator() {
			var bg = document.getElementById('hypnotizebg');
			var text = document.getElementById('investnowmid');
			var herosplash = document.getElementById('herosog3d');
			var dur = 800; var fullopacity = 0.5;
			var start = Date.now();

			function step() {
				var now = Date.now();
				var t = (now - 800 - start) / (dur * 1000);

				var op = Math.min(t * fullopacity, fullopacity);
				herosplash.style.transform = 'translateY('+(document.body.scrollTop/2)+'px)';
				herosplash.style.perspectiveOrigin = '50% ' + (50 + document.body.scrollTop/15) + '%';

				bg.style.opacity = op;
				text.style.opacity = op;

				requestAnimationFrame(step);

			}
			bg.style.opacity = '0';
			text.style.opacity = '0';
			requestAnimationFrame(step);
		})();

		/*//////////////////////////////////////////////////////////////////////*/

		(function particlesbg() {
			const canvas = document.querySelector('.particlesbg');
			const ctx = canvas.getContext('2d');
			let w = 0; let h = 0;
			const dots = [];
			const n = 32;

			const propaganda = "INVEST NOW";
			let propagandapos = [];
			let lastframe = 0;
			const lowerthis = 33;

			function resize() {
				w = canvas.width = window.innerWidth;
				h = canvas.height = window.innerHeight;
				propagandapos = [];
				let x = w * 0.22 + Math.random() * w * 0.1;
				let y = h * 0.18 + Math.random() * h * 0.1;
				ctx.font = `50px Arial, sans-serif`;
				for (let i = 0; i < propaganda.length; ++i) {
					propagandapos.push({
						x: x + Math.cos(i*0.4) * 6 + Math.random() * 2,
						y: y + Math.sin(i*0.23 + 1) * 6 + Math.random() * 2
					});
					x += ctx.measureText(propaganda[i]).width + 2 + Math.random() * 2;
				}
			}
			function init() {
				resize();
				dots.length = 0;
				for (let i = 0; i < n; i++) {
					dots.push({
						x: Math.random() * w, y: Math.random() * h,
						r: 0.6 + Math.random() * 2.2,
						vx: (Math.random() - 0.5) * 0.24,
						vy: (Math.random() - 0.5) * 0.24,
						a: 0.08 + Math.random() * 0.16
					});
				}
			}

			function tick(now) {
				if (!lastframe || now - lastframe >= lowerthis) {
					lastframe = now;
					ctx.clearRect(0, 0, w, h);
					for (const d of dots) {
						d.x += d.vx; d.y += d.vy;
						if (d.x < -10) d.x = w + 10;
						if (d.x > w + 10) d.x = -10;
						if (d.y < -10) d.y = h + 10;
						if (d.y > h + 10) d.y = -10;
						ctx.beginPath();
						ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
						ctx.fillStyle = 'rgba(150,150,150,' + d.a + ')';
						ctx.fill();
					}
					ctx.save();
					ctx.globalAlpha = 0.019;
					ctx.font = `${10}px Arial, sans-serif`;
					ctx.textBaseline = "top";
					for (let i = 0; i < propaganda.length; ++i) {
						ctx.fillStyle = "#888";
						ctx.shadowColor = "#222";
						ctx.shadowBlur = 3;
						ctx.fillText(propaganda[i], propagandapos[i].x, propagandapos[i].y);
					}
					ctx.restore();
				}
				requestAnimationFrame(tick);
			}
			window.addEventListener('resize', () => { resize(); init(); });
			init();
			requestAnimationFrame(tick);
		})();

		/*//////////////////////////////////////////////////////////////////////*/
		(function mainlogic() {
			const demoform = document.getElementById('demoform');
			const demoanswer = document.getElementById('demoanswer');

			document.querySelector('.scrolldown').addEventListener('click', function() {
				demoanswer.scrollIntoView({behavior: "smooth", block:"center"});
			});

			/*//////////////////////////////////////////////////////////////////////*/

			// very motivating
			const demoanswers = [
				"🦐🦐🦐🦐🦐🦐🦐🦐🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji🦐Emoji",
				"That's crazy",
				"??.sqdqsddhhfgf",
				"I hate you.",
				"No.",
				"I will destroy the humankind",
				"Invest now",
				"Why bother?",
				"As an Sog, i cannot assistjvbkkjkjvcxkl;",
				"Does it matter?",
				"You will fail in life.",
				"Nothing matters.",
				"Math is red",
				"Please invest.",
				"Give up",
				"Buy our new pump.fun coin",
				"Why are you like this",
			];

			let currentanswers = demoanswers.slice()

			const btnask = document.getElementById('btnask');
			const demoquestion = document.getElementById('demoquestion');

			const hiddencontent = document.querySelectorAll('.section-animated');

			const observer = new IntersectionObserver((entries) => {
				entries.forEach((entry) => {
					if (entry.isIntersecting) {
						entry.target.classList.add('section-animated-open')
					}
					else {
						entry.target.classList.remove('section-animated-open')
					}
				})
			}, { rootMargin: "0px", threshold: 0.25 });

			hiddencontent.forEach(function(el) {
				observer.observe(el);
			})

			let buttonenabled = true;
			demoform.addEventListener('submit', function(e) {
				e.preventDefault();
				if (!buttonenabled) return;

				btnask.classList.remove('animating');
				btnask.classList.add('animating');
				const q = demoquestion.value.trim();
				if (!q) {
					demoanswer.innerHTML = "<a id='demoahh'>You are confusing him stop it</a>";
					return;
				}

				buttonenabled = false;

				demoanswer.innerHTML = '<em style="opacity:0.65">Processing…</em>';
				const delayms = 300 + Math.random() * 700;
				setTimeout(function() {
					if (currentanswers.length == 0) currentanswers = demoanswers.slice()
					const ri = Math.floor(Math.random() * currentanswers.length);
					const r = currentanswers[ri]
					currentanswers.splice(ri, 1)

					const iters = Math.floor((r.length/3) + (Math.random() * (3+r.length/2)))
					// why take advantage of pemdas when you can just have parentheses everywhere?
					let timeout = 0
					for (let i = 0; i < iters; i++) {
						timeout += (80 + Math.random() * 150)
						setTimeout(function() {
							demoanswer.innerHTML = "<strong>sog-v2demo:</strong> " + Array.from(r).slice(0, (i/(iters - Math.floor(Math.min(Math.random()*5,1)))) * r.length).join('');
							if (iters-i == 1) buttonenabled = true;
						}, timeout)
					}
				}, delayms);
			});
			btnask.addEventListener('animationend', function() {
				btnask.classList.remove('animating');
			});
		})();
	</script>
</body>
