<!DOCTYPE html>
<html lang="en">
<head>
	<title>soggy cat</title>
	<link rel="icon" href="favicon.ico">

	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta charset="UTF-8">

	<meta name="title" content="soggy cat">
	<meta property="og:title" content="soggy cat">

	<meta name="description" content="a picture of a wet cat inside a bathtub.">
	<meta property="og:description" content="a picture of a wet cat inside a bathtub.">

	<meta property="og:image" content="/static/ssoggycat/main/soggycat.webp">
	<meta name="color-scheme" content="light">
	<meta name="theme-color" content="#ffffff">

	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="soggy cat">
	<meta name="twitter:description" content="a picture of a wet cat inside a bathtub.">
	<meta name="twitter:image" content="https://soggy.cat/static/ssoggycat/shared/images/block1.png">
	<meta name="twitter:image" content="https://soggy.cat/static/ssoggycat/shared/images/block2.png">
	<meta name="twitter:image" content="https://soggy.cat/static/ssoggycat/shared/images/block3.png">
	<meta name="twitter:image" content="https://soggy.cat/static/ssoggycat/shared/images/block4.png">

	<link rel="stylesheet" href="/static/ssoggycat/shared/web/main.css">
	<link rel="stylesheet" href="/static/ssoggycat/sidemenu/web/sidemenu.css">
	<style>
		html, body {
			background: white !important;
		}
		.gradient-background {
			background: white !important;
		}

		#soggycat {
			box-shadow: none;
			filter: drop-shadow(0 0 50px rgba(0,0,0,0.2));
			image-rendering: crisp-edges;
		}

		#sidemenu {
			box-shadow: none;
		}

		#circlebtn {
			box-shadow: none;
			background: black;
			backdrop-filter: none;
			transition-timing-function: steps(2, start);
			transition-duration: 100ms;
		}

		#circlebtn:hover {
			background: black;
			width: 3vmin;
			height: 3vmin;
		}

		.sm {
			transition-duration: 100ms;
			transition-timing-function: steps(2, start);
		}

		.sm-button {
			transition: none;
		}

	</style>
</head>

<body data-soggy-pagetype="vtilt-js">
	<div class="gradient-background"></div>
	<img id="soggycat" src="/static/ssoggycat/main/svgs/modern.svg" width="1000" height="1333" alt="a picture of a wet cat inside a bathtub." loading="eager" decoding="async" data-tilt data-tilt-speed="100" data-tilt-easing="steps(2,start)" data-tilt-max="3">

	<div id="sidemenu" class="sm sm-closed" inert>
		<a aria-label="code" href="/github" target="GithubTarget">
			<div class = "sm-button">
				<img src="/static/other/sidemenu/svgs/code.svg" width="15" height="15" loading="lazy" decoding="async">
				<p>SOURCE</p>
			</div>
		</a>

		<a aria-label="enter code" href="#" onclick="event.preventDefault(); showcodeinput(); return false;">
			<div class="sm-button sm-small">
				<img src="/static/other/sidemenu/svgs/enter.svg" width="15" height="15" loading="lazy" decoding="async">
				<p>AUTHORIZATION</p>
			</div>
		</a>

		<a aria-label="no css" href="nocss" target="NoCSSTarget">
			<div class="sm-button sm-small">
				<img src="/static/other/sidemenu/svgs/nocss.svg" width="15" height="15" loading="lazy" decoding="async">
				<p>UNSTYLED</p>
			</div>
		</a>

		<a aria-label="upload" href="#" onclick="document.getElementById('picker').click(); return false;">
			<div class="sm-button sm-small">
				<img src="/static/other/sidemenu/svgs/upload.svg" width="15" height="15" loading="lazy" decoding="async">
				<p>POST</p>
			</div>
		</a>
	</div>

	<button id="circlebtn" type="button" aria-label="Navigation"></button>
	<span id="player" style="display: none"></span>
	<input type="file" id="picker" style="display: none" accept="image/*">

	<div id="codeinputelmodal" class="entercode entercodehidden">
		<div class="entercodecontent">
			<input type="text" id="codeinputel" placeholder="code" autocomplete="off" spellcheck="false">
		</div>
	</div>

	<script src="/static/other/shared/web/vanillatilt.js" defer></script>
	<script src="/static/other/shared/web/color-thief.umd.js" defer></script>

	<script src="/static/ssoggycat/shared/web/main.js" defer></script>
	<script src="/static/ssoggycat/sidemenu/web/sidemenu.js" defer></script>
</body>
</html>
